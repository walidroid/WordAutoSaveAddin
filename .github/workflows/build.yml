name: Build Word Auto-Save Add-in (MSI)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Release DLL
      run: |
        msbuild WordAutoSaveAddin.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Add WiX to PATH
      shell: pwsh
      run: echo "${env:WIX}bin" | Out-File -FilePath $env:GITHUB_PATH -Append

    - name: Build MSI Installer
      shell: pwsh
      run: |
        candle Setup.wxs -ext WixUIExtension
        light  Setup.wixobj -ext WixUIExtension -o WordAutoSaveAddin.msi

    - name: Upload MSI
      uses: actions/upload-artifact@v4
      with:
        name: WordAutoSaveAddin-Installer
        path: WordAutoSaveAddin.msi
